<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">PPT report shell example</title>
  <desc id="desc">A visual example of a 16:9 HTML deck with slide navigation, editable objects, and export controls.</desc>
  <defs>
    <linearGradient id="stage" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#edf4f8"/>
    </linearGradient>
    <linearGradient id="slide" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f6f9fc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#1c2f4c" flood-opacity=".18"/>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="url(#stage)"/>
  <g transform="translate(72 84)">
    <rect width="790" height="444" rx="6" fill="url(#slide)" stroke="#d9e2ec" filter="url(#shadow)"/>
    <rect x="0" y="0" width="790" height="64" rx="6" fill="#132f57"/>
    <rect x="42" y="28" width="126" height="10" rx="5" fill="#ffffff" opacity=".75"/>
    <rect x="620" y="28" width="106" height="10" rx="5" fill="#ffffff" opacity=".38"/>
    <text x="42" y="126" font-family="Arial, sans-serif" font-size="34" font-weight="800" fill="#18212f">固定 16:9 PPT 画布</text>
    <rect x="42" y="154" width="396" height="12" rx="6" fill="#647082" opacity=".35"/>
    <rect x="42" y="180" width="328" height="12" rx="6" fill="#647082" opacity=".24"/>
    <g transform="translate(42 240)">
      <rect width="180" height="118" rx="8" fill="#eef6ff" stroke="#cddff5"/>
      <rect x="22" y="24" width="72" height="16" rx="8" fill="#1e5aa8"/>
      <rect x="22" y="58" width="120" height="10" rx="5" fill="#647082" opacity=".35"/>
      <rect x="22" y="80" width="96" height="10" rx="5" fill="#647082" opacity=".24"/>
    </g>
    <g transform="translate(250 240)">
      <rect width="180" height="118" rx="8" fill="#f2faf9" stroke="#cfe7e4"/>
      <rect x="22" y="24" width="72" height="16" rx="8" fill="#19a7b8"/>
      <rect x="22" y="58" width="120" height="10" rx="5" fill="#647082" opacity=".35"/>
      <rect x="22" y="80" width="96" height="10" rx="5" fill="#647082" opacity=".24"/>
    </g>
    <g transform="translate(500 120)">
      <rect width="222" height="238" rx="8" fill="#ffffff" stroke="#d9e2ec"/>
      <rect x="28" y="38" width="166" height="16" rx="8" fill="#1e5aa8"/>
      <rect x="28" y="76" width="118" height="118" rx="59" fill="#19a7b8" opacity=".18"/>
      <path d="M87 168 L125 110 L161 146" fill="none" stroke="#19a7b8" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
  <g transform="translate(132 566)">
    <rect width="55" height="34" rx="6" fill="#132f57"/>
    <rect x="68" width="55" height="34" rx="6" fill="#ffffff" stroke="#d9e2ec"/>
    <rect x="136" width="55" height="34" rx="6" fill="#ffffff" stroke="#d9e2ec"/>
    <text x="27.5" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">1</text>
    <text x="95.5" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#647082">2</text>
    <text x="163.5" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#647082">3</text>
  </g>
  <g transform="translate(1028 0)">
    <rect width="172" height="760" fill="#ffffff" stroke="#d9e2ec"/>
    <text x="86" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#18212f">PPT 样式抽屉</text>
    <rect x="22" y="72" width="128" height="32" rx="6" fill="#2f7d73"/>
    <text x="86" y="93" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#ffffff">编辑模式</text>
    <rect x="18" y="132" width="136" height="46" rx="7" fill="#f6f9fc" stroke="#d9e2ec"/>
    <rect x="18" y="194" width="136" height="46" rx="7" fill="#f6f9fc" stroke="#d9e2ec"/>
    <rect x="18" y="256" width="136" height="46" rx="7" fill="#f6f9fc" stroke="#d9e2ec"/>
    <rect x="18" y="318" width="136" height="46" rx="7" fill="#f6f9fc" stroke="#d9e2ec"/>
    <rect x="18" y="380" width="136" height="46" rx="7" fill="#f6f9fc" stroke="#d9e2ec"/>
    <g transform="translate(18 668)">
      <rect width="40" height="32" rx="6" fill="#2f7d73"/>
      <rect x="48" width="40" height="32" rx="6" fill="#ffffff" stroke="#d9e2ec"/>
      <rect x="96" width="40" height="32" rx="6" fill="#ffffff" stroke="#d9e2ec"/>
      <text x="20" y="21" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ffffff">HTML</text>
      <text x="68" y="21" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#18212f">PDF</text>
      <text x="116" y="21" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#18212f">PPTX</text>
    </g>
  </g>
  <g transform="translate(742 572)">
    <rect width="206" height="64" rx="8" fill="#ffffff" stroke="#d9e2ec" filter="url(#shadow)"/>
    <text x="103" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#18212f">HTML 导出选择</text>
    <rect x="26" y="38" width="70" height="16" rx="8" fill="#2f7d73"/>
    <rect x="110" y="38" width="70" height="16" rx="8" fill="#eef3f8"/>
  </g>
</svg>
